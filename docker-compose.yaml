services:
  mysql:
    image: mysql:8.0
    container_name: wechat-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wechat
      MYSQL_USER: wechat
      MYSQL_PASSWORD: wechat123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  db_data:
